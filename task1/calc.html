<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор</title>
</head>
<body>
    <h1>Калькулятор</h1>
    <div class="calculator">
        <input id="display" type="text" value="0" readonly>
        <table border="0" cellpadding="5">
            <tr>
                <td><button data-action="digit" data-value="7">7</button></td>
                <td><button data-action="digit" data-value="8">8</button></td>
                <td><button data-action="digit" data-value="9">9</button></td>
                <td><button data-action="operator" data-value="/">/</button></td>
            </tr>
            <tr>
                <td><button data-action="digit" data-value="4">4</button></td>
                <td><button data-action="digit" data-value="5">5</button></td>
                <td><button data-action="digit" data-value="6">6</button></td>
                <td><button data-action="operator" data-value="*">*</button></td>
            </tr>
            <tr>
                <td><button data-action="digit" data-value="1">1</button></td>
                <td><button data-action="digit" data-value="2">2</button></td>
                <td><button data-action="digit" data-value="3">3</button></td>
                <td><button data-action="operator" data-value="-">-</button></td>
            </tr>
            <tr>
                <td><button data-action="digit" data-value="0">0</button></td>
                <td><button data-action="clear">C</button></td>
                <td><button data-action="equals">=</button></td>
                <td><button data-action="operator" data-value="+">+</button></td>
            </tr>
        </table>
    </div>
    <p><a href="index.html">Назад</a></p>

    <script>
        let display = document.getElementById('display');
        let buttons = document.querySelectorAll('button');
        let firstOperand = null;
        let operator = null;
        let shouldResetDisplay = false;

        function updateDisplay(value) {
            display.value = value;
        }

        function clearCalculator() {
            firstOperand = null;
            operator = null;
            shouldResetDisplay = false;
            updateDisplay('0');
        }

        function calculate(a, b, op) {
            switch (op) {
                case '+': return a + b;
                case '-': return a - b;
                case '*': return a * b;
                case '/': return b === 0 ? 'Ошибка' : a / b;
                default: return b;
            }
        }

        function inputDigit(digit) {
            if (display.value === 'Ошибка') clearCalculator();
            if (shouldResetDisplay || display.value === '0') {
                updateDisplay(digit);
                shouldResetDisplay = false;
            }
            else updateDisplay(display.value + digit);
        }

        function inputOperator(nextOperator) {
            if (display.value === 'Ошибка') {
                clearCalculator();
                return;
            }
            let currentValue = Number(display.value);
            if (firstOperand === null) firstOperand = currentValue;
            else if (operator && !shouldResetDisplay) {
                let result = calculate(firstOperand, currentValue, operator);
                if (result === 'Ошибка') {
                    updateDisplay(result);
                    firstOperand = null;
                    operator = null;
                    shouldResetDisplay = true;
                    return;
                }
                firstOperand = result;
                updateDisplay(String(result));
            }
            operator = nextOperator;
            shouldResetDisplay = true;
        }

        function inputEquals() {
            if (display.value === 'Ошибка') {
                clearCalculator();
                return;
            }
            if (operator === null || firstOperand === null) return;
            let secondOperand = Number(display.value);
            let result = calculate(firstOperand, secondOperand, operator);
            updateDisplay(String(result));
            firstOperand = null;
            operator = null;
            shouldResetDisplay = true;
        }

        buttons.forEach((button) => {
            button.addEventListener('click', () => {
                let action = button.dataset.action;
                let value = button.dataset.value;
                if (action === 'digit') {
                    inputDigit(value);
                } else if (action === 'operator') {
                    inputOperator(value);
                } else if (action === 'equals') {
                    inputEquals();
                } else if (action === 'clear') {
                    clearCalculator();
                }
            });
        });
    </script>
</body>
</html>
